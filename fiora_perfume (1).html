<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiora Perfume</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }
    header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: black;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
    }
    .hero {
      text-align: center;
      padding: 100px 20px;
      background: url('https://images.unsplash.com/photo-1585386959984-a4155224a1ad') no-repeat center/cover;
    }
    .hero h1 {
      font-size: 40px;
    }
    .btn {
      padding: 12px 25px;
      background: gold;
      color: black;
      text-decoration: none;
      border-radius: 8px;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 40px;
    }
    .product {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
    .product img {
      width: 100%;
      border-radius: 10px;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: black;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Fiora Perfume</div>
</header>

<section class="hero">
  <h1>أفضل العطور الرجالي والحريمي</h1>
  <p>ثبات عالي وسعر ممتاز</p>
  <a class="btn" href="https://wa.me/201031918117">اطلب الآن واتساب</a>
</section>

<section class="products">
  <div class="product">
    <img src="https://images.unsplash.com/photo-1594035910387-fea47794261f">
    <h3>عطر مستوحى من Dior</h3>
    <p>350 جنيه</p>
  </div>
  <div class="product">
    <img src="https://images.unsplash.com/photo-1615634262417-1c0c8a3c6d80">
    <h3>عطر مستوحى من Gucci</h3>
    <p>350 جنيه</p>
  </div>
</section>

<footer>
  <p>تواصل معنا على واتساب</p>
</footer>

</body>
</html>
